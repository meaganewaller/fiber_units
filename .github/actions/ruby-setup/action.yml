name: Ruby Setup
description: Setup Ruby and install dependencies

runs:
  using: composite
  steps:
    - uses: actions/checkout@v5

    - uses: jdx/mise-action@v3
      with:
        install: true
        cache: true
        mise_toml: |
          [tools]
          ruby = "4.0.1"

    - uses: actions/cache@v4
      with:
        path: vendor/bundle
        key: bundle-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}

    - run: bundle install --jobs 4 --retry 3
      shell: bash
