name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify gem version matches tag
        run: |
          GEM_VERSION=$(ruby -e "puts Gem::Specification.load('fiber_units.gemspec').version")
          if [ "$GEM_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "❌ Version mismatch: gemspec=$GEM_VERSION tag=${{ steps.version.outputs.VERSION }}"
            exit 1
          fi
          echo "✅ Gem version matches tag"

      - name: Verify changelog entry
        run: |
          if ! grep -q "## \[${{ steps.version.outputs.VERSION }}\]" CHANGELOG.md; then
            echo "❌ Version ${{ steps.version.outputs.VERSION }} not found in CHANGELOG.md"
            exit 1
          fi
          echo "✅ Changelog entry verified for ${{ steps.version.outputs.VERSION }}"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.1"
          bundler-cache: true

      - name: Build gem
        run: gem build fiber_units.gemspec

      - name: Configure RubyGems credentials
        run: |
          mkdir -p ~/.gem
          echo ":rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials

      - name: Publish gem
        run: gem push *.gem

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
